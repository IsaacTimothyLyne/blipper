[variables]
NIXPACKS_PHP_VERSION = "8.4"

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --ignore-platform-reqs"]

[phases.setup]
cmds = [
    "npm install",
    "npm run build",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache",
]

[phases.setup.aptPkgs]
sqlite3 = "*"
